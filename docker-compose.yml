version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: stock_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-stock_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - stock_network

  airflow:
    image: apache/airflow:2.8.1-python3.10
    container_name: stock_airflow
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - DB_HOST=postgres
    command: bash -c "pip install -r /opt/airflow/requirements.txt && airflow standalone"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./.env:/opt/airflow/.env
      - ./requirements.txt:/opt/airflow/requirements.txt
    networks:
      - stock_network

networks:
  stock_network:
    driver: bridge

volumes:
  postgres_data: